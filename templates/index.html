<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fake News Detection</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Doto:wght@900&family=Oxanium:wght@200..800&display=swap"
  rel="stylesheet"
/>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
  .button {
    width: 100%;
    padding: 10px;
    background-color: rgb(6, 116, 0);
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  .button:hover {
    background-color: #02982f;
  }
</style>

  </head>

  <body>
    <div class="w-full h-screen bg-[url('/static/bg1.webp')] bg-cover">
      <div class="w-full h-screen bg-[rgba(0,0,0,0.8)]">
    <!-- Title -->
    <div class="w-full h-14 flex justify-center py-4">
      <h1 class="text-white text-3xl font-[Doto] font-extrabold">
        Fake News Detection System Using Machine Learning
      </h1>
    </div>

    <!-- Form -->
    <div class="w-full flex justify-center">
      <div class="w-6/12 rounded bg-[rgba(0,0,0,0.4)] my-10 p-4">
        <form id="newsForm">
          <textarea
            name="news"
            class="bg-transparent border-2 border-[#006a20] rounded w-full h-64 outline-0 text-white p-2"
            placeholder="Enter the news you want to verify..."
            required
          ></textarea>

          <button type="submit" class="w-full h-10 button mt-3">
            Submit
          </button>
        </form>
      </div>
    </div>

    <!-- Result -->
    <div class="w-full flex justify-center">
      <div class="w-4/12 h-44 flex flex-col justify-center items-center">
        <p class="text-4xl font-[Oxanium] text-box text-white">
          Verify News
        </p>
        <img src="" width="150px" class="img-box mt-4" style="display:none;" />
      </div>
    </div>

  </div>
</div>

<!-- JS -->
<script>
  const form = document.getElementById("newsForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    console.log("Sending:", data);

    const text_box = document.querySelector(".text-box");
    const img_box = document.querySelector(".img-box");

    text_box.innerHTML = "Checking...";
    text_box.style.color = "white";

    try {
      const response = await fetch("/predictdata", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();
      console.log("Response:", result);

      if (result.result === "Real News") {
        img_box.src = "/static/correct.png";
        text_box.innerHTML = "True News";
        text_box.style.color = "green";
      } else {
        img_box.src = "/static/fake.png";
        text_box.innerHTML = "Fake News";
        text_box.style.color = "red";
      }

      img_box.style.display = "block";

    } catch (error) {
      console.error("Error:", error);
      text_box.innerHTML = "Error connecting to server";
      text_box.style.color = "red";
    }
  });
</script>
  </body>
</html>
